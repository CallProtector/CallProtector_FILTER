name: Docker CI/CD for AI Server

on:
  workflow_dispatch
  # push:
  #   branches: [ "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push AI Image
        run: |
          docker build -t callprotect/ai-server:latest .
          docker push callprotect/ai-server:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/CallProtector_BE
            docker compose pull
            docker compose up -d --no-deps ai-server

